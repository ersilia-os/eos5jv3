Identifier: eos5jv3
Slug: mycopermenet
Status: In progress
Title: MycoPermeNet
Description: Predicts the permeation of small molecules across the mycomembrane 
  (the mycobacterial outer membrane) of *Mycobacterium tuberculosis*. Taking a 
  SMILES string as input, this deep-learning model (a multilayer perceptron over
  learned chemical embeddings) outputs a standardized-residual permeability 
  score. Higher permeation is associated with nitrogen-containing aromatic 
  scaffolds such as indole. Useful for prioritizing anti-TB compounds likely to 
  accumulate within Mtb cells.
